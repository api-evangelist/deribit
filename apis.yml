  - name: Deribit WebSocket API
    description: JSON-RPC over WebSocket interface for real-time bidirectional communication with the Deribit exchange. Recommended for most use cases, supporting real-time market data subscriptions, trading operations, account notifications, and streaming updates for order books, trades, positions, and portfolio.
